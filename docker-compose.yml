version: '3.8'

services:
  app:
    build:
      context: .
    image: cenp-app:latest
    container_name: cenp-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./vendor:/var/www/vendor
      - ./node_modules:/var/www/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=1
      - DB_HOST=db
      - DB_DATABASE=cenp
      - DB_USERNAME=cenp
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: cenp-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: cenp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: cenp
      MYSQL_USER: cenp
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  node:
    image: node:20
    container_name: cenp-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./node_modules:/var/www/node_modules
    command: sh -c "npm install && npm run build"
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
